name = "facturado-storage"
compatibility_date = "2024-01-01"

# Cloudflare R2 bucket bindings
[[r2_buckets]]
  binding = "FACTURADO_BUCKET"
  bucket_name = "facturado"
  preview_bucket_name = "facturado-preview"

# Environment-specific configuration
[env.production]
  name = "facturado-storage"

[env.staging]
  name = "facturado-storage-staging"
