[build]
  base = "apps/web"
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  VITE_API_URL = "https://api.facturado.do/api/v1"

# SPA redirect rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy (if API is on the same Netlify deployment)
[[redirects]]
  from = "/api/*"
  to = "https://api.facturado.do/api/:splat"
  status = 200
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Preview deployments
[context.deploy-preview]
  command = "pnpm run build"
  [context.deploy-preview.environment]
    VITE_API_URL = "https://api-staging.facturado.do/api/v1"

[context.branch-deploy]
  command = "pnpm run build"
